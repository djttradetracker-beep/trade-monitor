name: trump-trade-monitor

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes
  workflow_dispatch: {}        # lets you press "Run" manually to test

permissions:
  contents: write              # needed so it can save its memory back to the repo

concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run the monitor
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO:  ${{ secrets.EMAIL_TO }}
        run: python trump_trade_monitor.py

      - name: Save memory (state) back to the repo
        run: |
          git config user.name  "trade-monitor-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.json || true
          git commit -m "update state" || echo "no changes"
          git push || echo "nothing to push"
